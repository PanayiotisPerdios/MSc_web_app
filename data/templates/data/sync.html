{% extends "base.html" %}
{% load static %}

{% block title %}MSc Deadlines — Sync{% endblock %}

{% block extra_head %}
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'core/css/sync.css' %}">
{% endblock %}

{% block content %}
<div class="sync-section">
  <button id="sync-btn" class="btn-sync" hx-post="{% url 'sync_run' %}" hx-target="#sync-result" hx-swap="innerHTML" hx-indicator="#sync-btn">
    ↻ Synchronize Programmes
  </button>

  <div id="sync-status" class="sync-status">
    Ready to synchronize
  </div>

  <div id="sync-result"></div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'core/js/sync.js' %}"></script>
{% endblock %}
