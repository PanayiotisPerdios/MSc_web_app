{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MSc Deadlines — Study in Greece</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="{% static 'core/css/global.css' %}">
  <link rel="stylesheet" href="{% static 'core/css/sync.css' %}">

</head>
<body>

<nav class="navbar navbar-light sticky-top">
  <div class="navbar-brand">
    MSc Deadlines <span>— Study in Greece</span>
  </div>
  <div class="navbar-right">
    <small class="text-muted">{{ user.username }}</small>
    <form method="post" action="{% url 'logout' %}" class="m-0">
      {% csrf_token %}
      <button type="submit" class="btn btn-outline-secondary btn-sm">Logout</button>
    </form>
  </div>
</nav>

<div class="sync-section">
  <button id="sync-btn" class="btn-sync">
    ↻ Synchronize Programmes
  </button>

  <div id="sync-status" class="sync-status">
    Ready to synchronize
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>

<script src="{% static 'core/js/sync.js' %}"></script>

</body>
</html>
