{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MSc Deadlines — Study in Greece</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="{% static 'core/css/sync.css' %}">

</head>
<body>

<header class="hdr">
  <div>
    <span class="hdr-logo">MSc Deadlines <span>— Study in Greece</span></span>
  </div>
  <div class="hdr-right">
    <span style="font-size:11px;color:#aaa;">{{ user.username }}</span>
    <form method="post" action="{% url 'logout' %}" style="margin:0;">
      {% csrf_token %}
      <button type="submit" class="btn-logout">Logout</button>
    </form>
  </div>
</header>

<div class="sync-section">
    <button id="sync-btn" class="btn-sync">
        ↻ Synchronize Programmes
    </button>

    <div id="sync-status" class="sync-status">
        Ready to synchronize
    </div>
</div>

<script src="{% static 'core/js/sync.js' %}"></script>
</body>
</html>
