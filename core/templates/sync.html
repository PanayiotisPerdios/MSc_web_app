<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSc Deadlines — Study in Greece</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  background: #f4f4f2;
  color: #1a1a1a;
  min-height: 100vh;
}

a {
  color: inherit;
  text-decoration: none;
}

.hdr {
  background: #fff;
  border-bottom: 1px solid #e5e5e3;
  padding: 0 28px;
  height: 52px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.hdr-logo {
  font-size: 14px;
  font-weight: 600;
  color: #1a1a1a;
  letter-spacing: -0.02em;
}

.hdr-logo span {
  color: #888;
  font-weight: 400;
}

.hdr-right {
  margin-left: auto;
  display: flex;
  gap: 8px;
  align-items: center;
}

.btn-logout {
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 500;
  padding: 5px 12px;
  border-radius: 6px;
  cursor: pointer;
  border: 1px solid #e0e0de;
  background: #fff;
  color: #555;
  transition: all 0.12s;
}

.btn-logout:hover {
  border-color: #bbb;
  background: #fafafa;
}

.btn {
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 500;
  padding: 5px 12px;
  border-radius: 6px;
  cursor: pointer;
  border: 1px solid #e0e0de;
  background: #fff;
  color: #555;
  transition: all 0.12s;
}

.btn:hover {
  border-color: #bbb;
  background: #fafafa;
}

.btn-primary {
  background: #1a1a1a;
  color: #fff;
  border-color: #1a1a1a;
}

.btn-primary:hover {
  background: #333;
  border-color: #333;
}

.stats-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 1px;
  background: #e5e5e3;
  border-bottom: 1px solid #e5e5e3;
}

.stat {
  background: #fff;
  padding: 16px 20px;
}

.stat-n {
  font-size: 24px;
  font-weight: 600;
  line-height: 1;
  letter-spacing: -0.03em;
}

.stat-n.g {
  color: #1a7a4a;
}

.stat-n.r {
  color: #c0392b;
}

.stat-n.o {
  color: #c07a00;
}

.stat-l {
  font-size: 11px;
  color: #aaa;
  margin-top: 3px;
  letter-spacing: 0.01em;
}

.cov-bar-wrap {
  background: #fff;
  border-bottom: 1px solid #e5e5e3;
  padding: 10px 28px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.cov-track {
  flex: 1;
  height: 3px;
  background: #eee;
  border-radius: 2px;
  display: flex;
  overflow: hidden;
}

.cov-f {
  background: #1a7a4a;
  transition: width 0.5s;
}

.cov-m {
  background: #e8e0d8;
  transition: width 0.5s;
}

.cov-e {
  background: #f0c8b8;
  transition: width 0.5s;
}

.cov-pct {
  font-size: 11px;
  font-weight: 600;
  color: #1a7a4a;
  min-width: 32px;
  text-align: right;
}

.filters {
  padding: 10px 28px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  background: #fff;
  border-bottom: 1px solid #e5e5e3;
}

.filters input,
.filters select {
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  background: #f8f8f7;
  border: 1px solid #e5e5e3;
  color: #1a1a1a;
  padding: 5px 10px;
  border-radius: 6px;
  outline: none;
}

.filters input {
  width: 200px;
}

.filters input:focus,
.filters select:focus {
  border-color: #999;
  background: #fff;
}

.sep {
  width: 1px;
  height: 18px;
  background: #e5e5e3;
  margin: 0 2px;
}

.result-count {
  margin-left: auto;
  font-size: 11px;
  color: #bbb;
}

.tbl-wrap {
  padding: 16px 28px 48px;
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 960px;
}

thead th {
  font-size: 10px;
  font-weight: 500;
  color: #aaa;
  text-align: left;
  padding: 8px 10px;
  border-bottom: 1px solid #e5e5e3;
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  background: #f4f4f2;
  position: sticky;
  top: 0;
  z-index: 10;
}

thead th:hover {
  color: #555;
}

thead th.asc::after {
  content: ' ↑';
  color: #1a1a1a;
}

thead th.desc::after {
  content: ' ↓';
  color: #1a1a1a;
}

tbody tr {
  border-bottom: 1px solid #eeeeec;
  transition: background 0.08s;
}

tbody tr:hover {
  background: #fafaf9;
}

td {
  padding: 10px 10px;
  vertical-align: top;
  background: #fff;
}

.uni-name {
  font-weight: 500;
  font-size: 12px;
  color: #1a1a1a;
  line-height: 1.3;
}

.uni-dept {
  font-size: 11px;
  color: #ccc;
  margin-top: 2px;
  max-width: 160px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.city-tag {
  display: inline-block;
  margin-top: 4px;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  background: #f0f4ff;
  color: #3a3a9a;
  border: 1px solid #dde4f8;
}

.prog-name {
  font-size: 12px;
  line-height: 1.4;
  color: #1a1a1a;
  max-width: 210px;
}

.prog-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  margin-top: 4px;
}

.ptag {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  border: 1px solid #e5e5e3;
  color: #888;
  background: #fafaf9;
  white-space: nowrap;
}

.ptag-topic {
  border-color: #dde4f8;
  color: #3a3a9a;
  background: #f0f4ff;
}

/* date cells — this is the key change */
.date-cell {
  min-width: 100px;
}

.date-val {
  font-size: 12px;
  font-weight: 600;
  color: #1a1a1a;
  line-height: 1.3;
  white-space: normal;
}

.date-val.has-date {
  background: #eef7f2;
  color: #1a7a4a;
  padding: 4px 8px;
  border-radius: 5px;
  border: 1px solid #c8e8d8;
  display: inline-block;
}

.date-val.no-date {
  color: #ddd;
  font-weight: 400;
  font-size: 11px;
}

.badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 500;
  padding: 3px 8px;
  border-radius: 4px;
  white-space: nowrap;
  letter-spacing: 0.01em;
}

.b-found {
  background: #eef7f2;
  color: #1a7a4a;
  border: 1px solid #c8e8d8;
}

.b-open {
  background: #eef7f2;
  color: #1a7a4a;
  border: 1px solid #c8e8d8;
}

.b-closed {
  background: #fdf2f2;
  color: #c0392b;
  border: 1px solid #f0cccc;
}

.b-rolling {
  background: #f0f4ff;
  color: #3a3a9a;
  border: 1px solid #ccd4f0;
}

.b-coming {
  background: #fff8ee;
  color: #c07a00;
  border: 1px solid #f0ddb0;
}

.b-missing {
  background: #fafaf9;
  color: #ccc;
  border: 1px solid #ebebea;
}

.b-error {
  background: #fff8ee;
  color: #c07a00;
  border: 1px solid #f0ddb0;
}

.apply-link a {
  font-size: 11px;
  color: #3a3a9a;
  display: block;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 110px;
}

.apply-link a:hover {
  text-decoration: underline;
}

.tuition {
  font-size: 11px;
  color: #888;
  white-space: nowrap;
}

.tuition.paid {
  color: #c07a00;
  font-weight: 500;
}

.notes-cell {
  font-size: 11px;
  color: #bbb;
  max-width: 150px;
  line-height: 1.4;
}

.pag {
  display: flex;
  gap: 4px;
  justify-content: center;
  padding: 16px 28px 32px;
  align-items: center;
  flex-wrap: wrap;
}

.pg {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  padding: 5px 10px;
  border-radius: 5px;
  cursor: pointer;
  border: 1px solid #e0e0de;
  background: #fff;
  color: #888;
}

.pg:hover {
  border-color: #bbb;
  color: #444;
}

.pg.on {
  background: #1a1a1a;
  color: #fff;
  border-color: #1a1a1a;
}

.pg:disabled {
  opacity: 0.35;
  cursor: default;
}

.pg-dots {
  color: #ccc;
  font-size: 11px;
  padding: 0 4px;
}

#drop-area {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - 52px);
  padding: 40px;
}

.drop-zone {
  border: 1px dashed #d0d0ce;
  border-radius: 12px;
  padding: 60px 48px;
  text-align: center;
  cursor: pointer;
  max-width: 440px;
  width: 100%;
  background: #fff;
  transition: border-color 0.15s, background 0.15s;
}

.drop-zone:hover,
.drop-zone.over {
  border-color: #888;
  background: #fafaf9;
}

.drop-icon {
  font-size: 36px;
  margin-bottom: 18px;
  opacity: 0.3;
}

.drop-zone h2 {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 6px;
}

.drop-zone p {
  font-size: 12px;
  color: #bbb;
  line-height: 1.6;
}

.empty {
  text-align: center;
  padding: 60px;
  font-size: 12px;
  color: #bbb;
}

.hidden {
  display: none !important;
}

.sync-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  background: #fff;
  border-bottom: 1px solid #e5e5e3;
}

.btn-sync {
  min-width: 280px;
  padding: 18px 32px;
  border: 1px solid #d6e8dd;
  border-radius: 12px;
  background: #eef7f2;
  color: #1a7a4a;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s ease;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
}

.btn-sync:hover {
  background: #e3f2ea;
  border-color: #b8d8c4;
  transform: translateY(-1px);
}

.btn-sync:active {
  transform: translateY(0);
}

.btn-sync.syncing {
  background: #fff8ee;
  border-color: #f0ddb0;
  color: #c07a00;
}

.btn-sync.done {
  background: #eef7f2;
  border-color: #c8e8d8;
  color: #1a7a4a;
}

.sync-status {
  margin-top: 12px;
  font-size: 12px;
  color: #888;
}

</style>
</head>
<body>

<header class="hdr">
  <div>
    <span class="hdr-logo">MSc Deadlines <span>— Study in Greece</span></span>
  </div>
  <div class="hdr-right">
    <span style="font-size:11px;color:#aaa;">{{ user.username }}</span>
    <form method="post" action="{% url 'logout' %}" style="margin:0;">
      {% csrf_token %}
      <button type="submit" class="btn-logout">Logout</button>
    </form>
  </div>
</header>

<div class="sync-section">
    <button id="sync-btn" class="btn-sync">
        ↻ Synchronize Programmes
    </button>

    <div id="sync-status" class="sync-status">
        Ready to synchronize
    </div>
</div>

<script>
function getCookie(name) {
  const match = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
  return match ? match.pop() : '';
}
const csrftoken = getCookie('csrftoken');

document.getElementById("sync-btn").addEventListener("click", async () => {

    const btn = document.getElementById("sync-btn");
    const status = document.getElementById("sync-status");

    btn.disabled = true;
    btn.classList.add("syncing");

    btn.textContent = "⟳ Synchronizing...";
    status.textContent = "Fetching programmes from API...";

    try {

        const response = await fetch("/data/sync_programmes/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": csrftoken
            }
        });

        const data = await response.json();

        btn.classList.remove("syncing");
        btn.classList.add("done");

        btn.textContent = "✓ Synchronization Complete";

        status.textContent =
            `Created: ${data.sync.created} | Updated: ${data.sync.updated} | Skipped ${data.sync.skipped}| Total: ${data.sync.total}`;

    } catch (err) {

        console.error(err);

        btn.classList.remove("syncing");

        btn.textContent = "Sync Failed";
        status.textContent = "An error occurred during synchronization.";

    } finally {

        setTimeout(() => {
            btn.disabled = false;

            btn.classList.remove("done");

            btn.textContent = "↻ Synchronize Programmes";
        }, 3000);

    }

});
</script>
</body>
</html>
