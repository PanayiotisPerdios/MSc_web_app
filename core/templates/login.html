{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login — Study in Greece</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'core/css/sync.css' %}">

</head>
<body>
<div class="box">
  <h1>Sign in</h1>
  {% if form.errors %}<div class="err">Invalid username or password.</div>{% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="field">
      <label for="id_username">Username</label>
      <input type="text" name="username" id="id_username" autofocus>
    </div>
    <div class="field">
      <label for="id_password">Password</label>
      <input type="password" name="password" id="id_password">
    </div>
    <button type="submit">Sign in</button>
  </form>
</div>
</body>
</html>
