{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Study in Greece</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{% static 'core/css/global.css' %}">
    <link rel="stylesheet" href="{% static 'core/css/login.css' %}">

</head>
<body>

<div class="login-card">
    <h1>Sign in</h1>
    
    {% if form.errors %}
        <div class="alert alert-danger" role="alert">
            Invalid username or password.
        </div>
    {% endif %}
    
    <form method="post">
        {% csrf_token %}
        
        <div class="mb-3">
            <label for="id_username" class="form-label">Username</label>
            <input type="text" class="form-control" name="username" id="id_username" autofocus>
        </div>
        
        <div class="mb-3">
            <label for="id_password" class="form-label">Password</label>
            <input type="password" class="form-control" name="password" id="id_password">
        </div>
        
        <button type="submit" class="btn btn-login">Sign in</button>
    </form>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>

</body>
</html>
