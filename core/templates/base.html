{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MSc Deadlines — Study in Greece</title>
  
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="{% static 'core/css/global.css' %}">
  <link rel="stylesheet" href="{% static 'core/css/base.css' %}">

</head>
<body>

<nav class="navbar navbar-light sticky-top">
  <div class="navbar-brand">
    MSc Deadlines <span>— Study in Greece</span>
  </div>
  <div class="navbar-right">
    <small class="text-muted">{{ user.username }}</small>
    <form method="post" action="{% url 'logout' %}" class="m-0">
      {% csrf_token %}
      <button type="submit" class="btn btn-outline-secondary btn-sm">Logout</button>
    </form>
  </div>
</nav>


<main class="dashboard">
  
  <a href="/scraper/" class="card card-action text-center" style="padding: 60px 48px;">
    <div class="card-body p-0">
      <div class="card-icon">⚙️</div>
      <h5 class="card-title">Scraper</h5>
      <p class="card-text">Run the scraper tool<br>Click to start</p>
    </div>
  </a>

  <a href="/results/" class="card card-action text-center" style="padding: 60px 48px;">
    <div class="card-body p-0">
      <div class="card-icon">🛢️</div>
      <h5 class="card-title">Internal Database Records</h5>
      <p class="card-text">Get currently saved records<br>Click to view</p>
    </div>
  </a>

  <a href="/sync/" class="card card-action text-center" style="padding: 60px 48px;">
    <div class="card-body p-0">
      <div class="card-icon">🔄</div>
      <h5 class="card-title">Sync</h5>
      <p class="card-text">Sync internal database with the API<br>Click to view</p>
    </div>
  </a>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>

</body>
</html>
