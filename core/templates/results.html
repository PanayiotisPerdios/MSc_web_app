<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSc Deadlines — Study in Greece</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;font-size:13px;background:#f4f4f2;color:#1a1a1a;min-height:100vh}
a{color:inherit;text-decoration:none}
 
/* ── Header ── */
.hdr{background:#fff;border-bottom:1px solid #e5e5e3;padding:0 28px;height:52px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.hdr-logo{font-size:14px;font-weight:600;color:#1a1a1a;letter-spacing:-0.02em}
.hdr-logo span{color:#888;font-weight:400}
.hdr-right{margin-left:auto;display:flex;gap:8px;align-items:center}
 
.btn{font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:5px 12px;border-radius:6px;cursor:pointer;border:1px solid #e0e0de;background:#fff;color:#555;transition:all .12s}
.btn:hover{border-color:#bbb;background:#fafafa}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-primary:hover{background:#333;border-color:#333}
 
/* ── Loading state ── */
#loading{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 52px);flex-direction:column;gap:12px}
.spinner{width:28px;height:28px;border:2px solid #e5e5e3;border-top-color:#1a1a1a;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:12px;color:#aaa}
 
/* ── Error state ── */
#error-state{display:none;align-items:center;justify-content:center;min-height:calc(100vh - 52px);flex-direction:column;gap:8px}
.error-icon{font-size:32px;opacity:.3}
.error-msg{font-size:13px;color:#c0392b}
.error-sub{font-size:11px;color:#bbb}
 
/* ── Stats ── */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:#e5e5e3;border-bottom:1px solid #e5e5e3}
.stat{background:#fff;padding:16px 20px}
.stat-n{font-size:24px;font-weight:700;line-height:1;letter-spacing:-0.03em;color:#1a1a1a}
.stat-n.g{color:#1a7a4a}
.stat-n.r{color:#c0392b}
.stat-n.o{color:#c07a00}
.stat-l{font-size:11px;color:#aaa;margin-top:3px;letter-spacing:.01em}
 
/* ── Coverage bar ── */
.cov-bar-wrap{background:#fff;border-bottom:1px solid #e5e5e3;padding:10px 28px;display:flex;align-items:center;gap:12px}
.cov-track{flex:1;height:4px;background:#eee;border-radius:2px;display:flex;overflow:hidden}
.cov-f{background:#1a7a4a;transition:width .6s ease}
.cov-m{background:#e8e0d8;transition:width .6s ease}
.cov-e{background:#f0c8b8;transition:width .6s ease}
.cov-pct{font-size:11px;font-weight:600;color:#1a7a4a;min-width:32px;text-align:right}
 
/* ── Filters ── */
.filters{padding:10px 28px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:#fff;border-bottom:1px solid #e5e5e3}
.filters input,.filters select{font-family:'Inter',sans-serif;font-size:12px;background:#f8f8f7;border:1px solid #e5e5e3;color:#1a1a1a;padding:5px 10px;border-radius:6px;outline:none;transition:border-color .12s}
.filters input{width:220px}
.filters input:focus,.filters select:focus{border-color:#999;background:#fff}
.sep{width:1px;height:18px;background:#e5e5e3;margin:0 2px}
.result-count{margin-left:auto;font-size:11px;color:#bbb;white-space:nowrap}
 
/* ── Table ── */
table{width:100%;border-collapse:collapse;min-width:960px}
 
thead th{font-size:10px;font-weight:500;color:#aaa;text-align:left;padding:8px 10px;border-bottom:1px solid #e5e5e3;white-space:nowrap;cursor:pointer;user-select:none;letter-spacing:.04em;text-transform:uppercase;background:#f4f4f2;position:sticky;top:52px;z-index:10}
thead th:hover{color:#555}
thead th.asc::after{content:' ↑';color:#1a1a1a}
thead th.desc::after{content:' ↓';color:#1a1a1a}
 
tbody tr{border-bottom:1px solid #eeeeec;transition:background .08s}
tbody tr:hover{background:#fafaf9}
td{padding:10px;vertical-align:top;background:transparent}
 
/* ── Cell styles ── */
.uni-name{font-weight:500;font-size:12px;color:#1a1a1a;line-height:1.3}
.uni-dept{font-size:11px;color:#ccc;margin-top:2px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.city-tag{display:inline-block;margin-top:4px;font-size:10px;padding:2px 6px;border-radius:4px;background:#f0f4ff;color:#3a3a9a;border:1px solid #dde4f8}
 
.prog-name{font-size:12px;line-height:1.4;color:#1a1a1a;max-width:220px}
.prog-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.ptag{font-size:10px;padding:2px 6px;border-radius:4px;border:1px solid #e5e5e3;color:#888;background:#fafaf9;white-space:nowrap}
.ptag-topic{border-color:#dde4f8;color:#3a3a9a;background:#f0f4ff}
 
.date-cell{min-width:100px}
.date-val{font-size:12px;font-weight:600;color:#1a1a1a;line-height:1.3}
.date-val.has-date{background:#eef7f2;color:#1a7a4a;padding:3px 8px;border-radius:5px;border:1px solid #c8e8d8;display:inline-block}
.date-val.no-date{color:#ddd;font-weight:400;font-size:11px}
 
.badge{display:inline-block;font-size:10px;font-weight:500;padding:3px 8px;border-radius:4px;white-space:nowrap;letter-spacing:.01em}
.b-found  {background:#eef7f2;color:#1a7a4a;border:1px solid #c8e8d8}
.b-open   {background:#eef7f2;color:#1a7a4a;border:1px solid #c8e8d8}
.b-closed {background:#fdf2f2;color:#c0392b;border:1px solid #f0cccc}
.b-rolling{background:#f0f4ff;color:#3a3a9a;border:1px solid #ccd4f0}
.b-coming {background:#fff8ee;color:#c07a00;border:1px solid #f0ddb0}
.b-missing{background:#fafaf9;color:#ccc;border:1px solid #ebebea}
.b-error  {background:#fff8ee;color:#c07a00;border:1px solid #f0ddb0}
 
.apply-link a{font-size:11px;color:#3a3a9a;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px}
.apply-link a:hover{text-decoration:underline}
.tuition{font-size:11px;color:#888;white-space:nowrap}
.tuition.paid{color:#c07a00;font-weight:500}
.notes-cell{font-size:11px;color:#bbb;max-width:150px;line-height:1.4}
 
/* ── Pagination ── */
.pag{display:flex;gap:4px;justify-content:center;padding:16px 28px 32px;align-items:center;flex-wrap:wrap}
.pg{font-family:'Inter',sans-serif;font-size:11px;padding:5px 10px;border-radius:5px;cursor:pointer;border:1px solid #e0e0de;background:#fff;color:#888;transition:all .1s}
.pg:hover{border-color:#bbb;color:#444}
.pg.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.pg:disabled{opacity:.35;cursor:default}
.pg-dots{color:#ccc;font-size:11px;padding:0 4px}
 
.empty{text-align:center;padding:60px;font-size:12px;color:#bbb}
.hidden{display:none!important}
</style>
</head>
<body>
 
<header class="hdr">
  <div>
    <span class="hdr-logo">MSc Deadlines <span>— Study in Greece</span></span>
  </div>
  <div class="hdr-right">
    <button class="btn" id="export-btn">Export CSV</button>
  </div>
</header>
 
<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <div class="loading-txt">Loading programmes…</div>
</div>
 
<!-- Error -->
<div id="error-state">
  <div class="error-icon">⚠</div>
  <div class="error-msg">Could not load programmes</div>
  <div class="error-sub" id="error-detail"></div>
</div>
 
<!-- Main -->
<div id="main-area" class="hidden">
 
  <div class="stats-row">
    <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l">Programmes</div></div>
    <div class="stat"><div class="stat-n g" id="s-found">0</div><div class="stat-l">Dates found</div></div>
    <div class="stat"><div class="stat-n" id="s-missing" style="color:#aaa">0</div><div class="stat-l">No dates</div></div>
    <div class="stat"><div class="stat-n o" id="s-errors">0</div><div class="stat-l">Errors</div></div>
    <div class="stat"><div class="stat-n g" id="s-pct">0%</div><div class="stat-l">Coverage</div></div>
  </div>
 
  <div class="cov-bar-wrap">
    <span style="font-size:11px;color:#bbb;white-space:nowrap">Coverage</span>
    <div class="cov-track">
      <div class="cov-f" id="cb-f" style="width:0%"></div>
      <div class="cov-m" id="cb-m" style="width:0%"></div>
      <div class="cov-e" id="cb-e" style="width:0%"></div>
    </div>
    <span class="cov-pct" id="cb-pct">0%</span>
  </div>
 
  <div class="filters">
    <input type="text" id="q" placeholder="Search programme, university, city…">
    <select id="f-status">
      <option value="">All statuses</option>
      <option value="found">Dates found</option>
      <option value="open">Open</option>
      <option value="closed">Closed</option>
      <option value="rolling">Rolling</option>
      <option value="coming_soon">Coming soon</option>
      <option value="missing">No dates</option>
      <option value="error">Errors</option>
    </select>
    <div class="sep"></div>
    <select id="f-uni"><option value="">All universities</option></select>
    <select id="f-topic"><option value="">All topics</option></select>
    <select id="f-city"><option value="">All cities</option></select>
    <div class="sep"></div>
    <select id="f-sort">
      <option value="university">Sort: University</option>
      <option value="deadline">Sort: Deadline</option>
      <option value="open_date">Sort: Open date</option>
      <option value="name_en">Sort: Programme</option>
      <option value="city">Sort: City</option>
    </select>
    <span class="result-count" id="count"></span>
  </div>
 
  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th data-col="university">University</th>
          <th data-col="name_en">Programme</th>
          <th data-col="open_date">Opens</th>
          <th data-col="deadline">Deadline</th>
          <th data-col="intake">Intake</th>
          <th data-col="application_status">Status</th>
          <th data-col="tuition">Tuition</th>
          <th>Apply</th>
          <th>Notes</th>
          <th>ATSIG</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty hidden" id="empty">No results match your filters.</div>
  </div>
 
  <div class="pag" id="pag"></div>
</div>
 
<script>
const SYNC_SECRET = "{{ sync_secret }}";

let all = [], filtered = [], sortCol = 'university', sortDir = 1, page = 1;
const PAGE = 50;
 
// ── Helpers ───────────────────────────────────────────────────────────────
 
function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
 
// DB returns booleans; old JSON used "yes"/"no" strings — normalise both
function isFound(r) {
  return r.found === true || r.found === 'yes';
}
 
function isError(r) {
  return r.scrape_status === 'error';
}
 
// topics/languages/study_modes come as arrays from DB, strings from CSV
function toArray(val, sep = ';') {
  if (Array.isArray(val)) return val.map(v => String(v).trim()).filter(Boolean);
  if (!val) return [];
  return String(val).split(sep).map(v => v.trim()).filter(Boolean);
}
 
// ── Init ──────────────────────────────────────────────────────────────────
 
function init() {
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('main-area').classList.remove('hidden');
  buildSelects();
  updateStats();
  applyFilters();
}
 
function buildSelects() {
  const unis   = [...new Set(all.map(r => r.university).filter(Boolean))].sort();
  const topics = [...new Set(all.flatMap(r => toArray(r.topics)))].sort();
  const cities = [...new Set(all.map(r => r.city).filter(Boolean))].sort();
  fill('f-uni',   unis,   'All universities');
  fill('f-topic', topics, 'All topics');
  fill('f-city',  cities, 'All cities');
}
 
function fill(id, vals, placeholder) {
  const s = document.getElementById(id);
  s.innerHTML = `<option value="">${placeholder}</option>` +
    vals.map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join('');
}
 
function updateStats() {
  const n   = all.length;
  const f   = all.filter(isFound).length;
  const e   = all.filter(isError).length;
  const m   = n - f - e;
  const pct = n ? Math.round(f / n * 100) : 0;
 
  document.getElementById('s-total').textContent   = n;
  document.getElementById('s-found').textContent   = f;
  document.getElementById('s-missing').textContent = m;
  document.getElementById('s-errors').textContent  = e;
  document.getElementById('s-pct').textContent     = pct + '%';
  document.getElementById('cb-pct').textContent    = pct + '%';
  document.getElementById('cb-f').style.width = (n ? f / n * 100 : 0) + '%';
  document.getElementById('cb-m').style.width = (n ? m / n * 100 : 0) + '%';
  document.getElementById('cb-e').style.width = (n ? e / n * 100 : 0) + '%';
}
 
// ── Filters & sort ────────────────────────────────────────────────────────
 
function applyFilters() {
  const q  = document.getElementById('q').value.toLowerCase();
  const fs = document.getElementById('f-status').value;
  const fu = document.getElementById('f-uni').value;
  const ft = document.getElementById('f-topic').value;
  const fc = document.getElementById('f-city').value;
 
  filtered = all.filter(r => {
    const hay = [r.name_en, r.name_gr, r.university, r.department, r.city, r.notes, r.deadline]
      .join(' ').toLowerCase();
    if (q  && !hay.includes(q))      return false;
    if (fu && r.university !== fu)   return false;
    if (fc && r.city !== fc)         return false;
    if (ft && !toArray(r.topics).includes(ft)) return false;
 
    if (fs) {
      if (fs === 'found'   && !isFound(r))                  return false;
      if (fs === 'missing' && (isFound(r) || isError(r)))   return false;
      if (fs === 'error'   && !isError(r))                  return false;
      if (['open','closed','rolling','coming_soon','not_mentioned'].includes(fs)
          && r.application_status !== fs)                   return false;
    }
    return true;
  });
 
  filtered.sort((a, b) => {
    const va = (a[sortCol] || '').toString().toLowerCase();
    const vb = (b[sortCol] || '').toString().toLowerCase();
    return va < vb ? -sortDir : va > vb ? sortDir : 0;
  });
 
  page = 1;
  render();
}
 
// ── Render ────────────────────────────────────────────────────────────────
 
function render() {
  const start  = (page - 1) * PAGE;
  const slice  = filtered.slice(start, start + PAGE);
  const tbody  = document.getElementById('tbody');
  const empty  = document.getElementById('empty');
 
  document.getElementById('count').textContent = filtered.length + ' results';
 
  if (!filtered.length) {
    tbody.innerHTML = '';
    empty.classList.remove('hidden');
    document.getElementById('pag').innerHTML = '';
    return;
  }
  empty.classList.add('hidden');
 
  tbody.innerHTML = slice.map(r => {
    // Status badge
    const st = isError(r)         ? 'error'
             : !isFound(r)        ? 'missing'
             : r.application_status === 'open'       ? 'open'
             : r.application_status === 'closed'     ? 'closed'
             : r.application_status === 'rolling'    ? 'rolling'
             : r.application_status === 'coming_soon'? 'coming'
             : 'found';
 
    const stLabel = {
      error: 'Error', missing: 'No dates', open: 'Open',
      closed: 'Closed', rolling: 'Rolling', coming: 'Coming soon', found: 'Found'
    }[st] || st;
 
    // Topics — array from DB
    const topicList = toArray(r.topics);
    const topicTags = topicList.slice(0, 2)
      .map(t => `<span class="ptag ptag-topic">${esc(t)}</span>`).join('');
 
    // Apply link
    const applyLink = r.apply_url
      ? `<a href="${esc(r.apply_url)}" target="_blank" title="${esc(r.apply_url)}">Apply →</a>`
      : r.programme_url
      ? `<a href="${esc(r.programme_url)}" target="_blank">Website →</a>`
      : '<span style="color:#ddd">—</span>';

    const atsigLink = r.atsig_url
      ? `<a class="btn" style="font-size:12px" href="${esc(r.atsig_url)}" target="_blank">Edit</a>`
      : '<span style="color:#ddd">—</span>';
 
    const tuitionCls = r.tuition && r.tuition !== 'Free' ? 'paid' : '';
 
    const deadlineHtml = r.deadline
      ? `<span class="date-val has-date">${esc(r.deadline)}</span>`
      : `<span class="date-val no-date">—</span>`;
 
    const openHtml = r.open_date
      ? `<span class="date-val has-date">${esc(r.open_date)}</span>`
      : `<span class="date-val no-date">—</span>`;
 
    return `<tr>
      <td>
        <div class="uni-name">${esc(r.university)}</div>
        <div class="uni-dept" title="${esc(r.department)}">${esc(r.department)}</div>
        <span class="city-tag">${esc(r.city)}</span>
      </td>
      <td>
        <div class="prog-name">${esc(r.name_en)}</div>
        <div class="prog-tags">
          ${topicTags}
          ${r.ects     ? `<span class="ptag">${esc(r.ects)} ECTS</span>`     : ''}
          ${r.semesters? `<span class="ptag">${esc(r.semesters)} sem</span>` : ''}
        </div>
      </td>
      <td class="date-cell">${openHtml}</td>
      <td class="date-cell">${deadlineHtml}</td>
      <td style="font-size:11px;color:#bbb;white-space:nowrap">${esc(r.intake) || '—'}</td>
      <td><span class="badge b-${st}">${stLabel}</span></td>
      <td class="tuition ${tuitionCls}">${esc(r.tuition) || '—'}</td>
      <td class="apply-link">${applyLink}</td>
      <td class="notes-cell">${esc(r.notes) || ''}</td>
      <td class="apply-link">${atsigLink}</td>
    </tr>`;
  }).join('');
 
  renderPag();
}
 
function renderPag() {
  const tot = Math.ceil(filtered.length / PAGE);
  const pag = document.getElementById('pag');
  if (tot <= 1) { pag.innerHTML = ''; return; }
 
  let h = `<button class="pg" onclick="goPage(${page - 1})" ${page === 1 ? 'disabled' : ''}>← Prev</button>`;
  for (let i = 1; i <= tot; i++) {
    if (i === 1 || i === tot || Math.abs(i - page) <= 2)
      h += `<button class="pg${i === page ? ' on' : ''}" onclick="goPage(${i})">${i}</button>`;
    else if (Math.abs(i - page) === 3)
      h += `<span class="pg-dots">…</span>`;
  }
  h += `<button class="pg" onclick="goPage(${page + 1})" ${page === tot ? 'disabled' : ''}>Next →</button>`;
  pag.innerHTML = h;
}
 
window.goPage = function(n) {
  const tot = Math.ceil(filtered.length / PAGE);
  if (n < 1 || n > tot) return;
  page = n;
  render();
  document.querySelector('.tbl-wrap').scrollIntoView({ behavior: 'smooth' });
};
 
// ── Export ────────────────────────────────────────────────────────────────
 
function exportCSV() {
  if (!filtered.length) return;
  const keys = Object.keys(filtered[0]);
  const rows = [
    keys.join(','),
    ...filtered.map(r => keys.map(k => `"${(r[k] || '').toString().replace(/"/g, '""')}"`).join(','))
  ];
  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'msc_deadlines.csv';
  a.click();
}
 
// ── Event listeners ───────────────────────────────────────────────────────
 
document.getElementById('q').addEventListener('input', applyFilters);
['f-status', 'f-uni', 'f-topic', 'f-city'].forEach(id =>
  document.getElementById(id).addEventListener('change', applyFilters)
);
document.getElementById('f-sort').addEventListener('change', e => {
  sortCol = e.target.value;
  applyFilters();
});
document.getElementById('export-btn').addEventListener('click', exportCSV);
 
document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = 1; }
    document.querySelectorAll('thead th').forEach(t => t.classList.remove('asc', 'desc'));
    th.classList.add(sortDir === 1 ? 'asc' : 'desc');
    document.getElementById('f-sort').value = col;
    applyFilters();
  });
});
 
// ── Load from DB ──────────────────────────────────────────────────────────
 
async function loadFromDB() {
  try {
    const response = await fetch('/data/programmes/');
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();
    all = data.data;
    init();
  } catch (err) {
    document.getElementById('loading').classList.add('hidden');
    const es = document.getElementById('error-state');
    es.style.display = 'flex';
    document.getElementById('error-detail').textContent = err.message;
  }
}
 
loadFromDB();
</script>
</body>
</html>
